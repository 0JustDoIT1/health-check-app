{% extends "base.html" %}

{% block title %}
<title>건강검진 수정</title>
<link href="{{ url_for('static', filename='css/create.css') }}" rel="stylesheet">
{% endblock %}

{% block contents %}

<div class="col-12">
  <div class="health-list-page">
    <div class="sub-actions mb-4">
      <a href="{{ url_for('health.healthDetail', id=data.id) }}" class="action-btn action-btn-save">
        <i class="fas fa-arrow-left mr-1"></i>목록으로
      </a>
    </div>
    <div class="health-header">
      <h1>건강검진 수정</h1>
      <p><span class="font-weight-bold">{{ data.exam_date.strftime('%Y.%m.%d') }}</span> 일자의 건강검진 정보를 수정합니다.</p>
    </div>

    <form action="/health/edit/{{ data.id }}" method="POST" class="user">

      <!-- 기본 정보 -->
      <div class="health-section">
        <div class="health-title">기본 정보</div>
        <div class="form-group row">

          <div class="col-12 col-md-6">
            <label>이름</label>
            <input type="text" name="name"
              value="{{ session['user_name'] }}"
              class="form-control" readonly />
          </div>

          <div class="col-12 col-md-6">
            <label>검사일자</label>
            <input type="date" name="exam_date"
              value="{{ data.exam_date }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>생년월일</label>
            <input type="date" name="birth_date"
              value="{{ data.birth_date }}"
              class="form-control" readonly />
          </div>

          <div class="col-12 col-md-6">
            <label>성별</label>
            <select name="gender" class="form-control" readonly>
              <option value="">선택</option>
              <option value="male" {{ 'selected' if data.gender == 'male' else '' }}>남성</option>
              <option value="female" {{ 'selected' if data.gender == 'female' else '' }}>여성</option>
            </select>
          </div>

        </div>
      </div>

      <!-- 신체 정보 -->
      <div class="health-section">
        <div class="health-title">신체 정보</div>
        <div class="form-group row">

          <div class="col-12 col-md-6">
            <label>키(cm)</label>
            <input type="number" step="0.1"
              name="height"
              value="{{ data.height }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>체중(kg)</label>
            <input type="number" step="0.1"
              name="weight"
              value="{{ data.weight }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>체질량지수(BMI)</label>
            <input type="number" step="0.1"
              name="BMI"
              value="{{ data.BMI }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>허리둘레(cm)</label>
            <input type="number" step="0.1"
              name="waist"
              value="{{ data.waist }}"
              class="form-control" required />
          </div>

        </div>
      </div>

      <!-- 시력 / 청력 -->
      <div class="health-section">
        <div class="health-title">시력 / 청력</div>
        <div class="form-group row">

          <div class="col-12 col-md-6">
            <label>시력(좌)</label>
            <input type="number" step="0.1"
              name="vision_left"
              value="{{ data.vision_left }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>시력(우)</label>
            <input type="number" step="0.1"
              name="vision_right"
              value="{{ data.vision_right }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>청력(좌)</label>
            <select name="hearing_left" class="form-control">
              <option value="0" {{ 'selected' if data.hearing_left == 0 else '' }}>정상</option>
              <option value="1" {{ 'selected' if data.hearing_left == 1 else '' }}>이상</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label>청력(우)</label>
            <select name="hearing_right" class="form-control">
              <option value="0" {{ 'selected' if data.hearing_right == 0 else '' }}>정상</option>
              <option value="1" {{ 'selected' if data.hearing_right == 1 else '' }}>이상</option>
            </select>
          </div>

        </div>
      </div>

      <!-- 혈압 / 혈액 -->
      <div class="health-section">
        <div class="health-title">혈압 / 혈액 검사</div>
        <div class="form-group row">

          <div class="col-12 col-md-6">
            <label>수축기 혈압</label>
            <input type="number" step="0.1"
              name="systolic_bp"
              value="{{ data.systolic_bp }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>이완기 혈압</label>
            <input type="number" step="0.1"
              name="diastolic_bp"
              value="{{ data.diastolic_bp }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>혈색소</label>
            <input type="number" step="0.1"
              name="hemoglobin"
              value="{{ data.hemoglobin }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>공복혈당</label>
            <input type="number" step="0.1"
              name="fasting_glucose"
              value="{{ data.fasting_glucose }}"
              class="form-control" required />
          </div>

        </div>
      </div>

      <!-- 간 / 신장 -->
      <div class="health-section">
        <div class="health-title">간 / 신장 기능</div>
        <div class="form-group row">

          <div class="col-12 col-md-6">
            <label>크레아티닌</label>
            <input type="number" step="0.1"
              name="creatinine"
              value="{{ data.creatinine }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>eGFR</label>
            <input type="number" step="0.1"
              name="eGFR"
              value="{{ data.eGFR }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>AST</label>
            <input type="number" step="0.1"
              name="AST"
              value="{{ data.AST }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>ALT</label>
            <input type="number" step="0.1"
              name="ALT"
              value="{{ data.ALT }}"
              class="form-control" required />
          </div>

          <div class="col-12 col-md-6">
            <label>γ-GTP</label>
            <input type="number" step="0.1"
              name="rGTP"
              value="{{ data.rGTP }}"
              class="form-control" required />
          </div>

        </div>
      </div>

      <!-- 기타 -->
      <div class="health-section">
        <div class="health-title">기타 검사</div>
        <div class="form-group row">

          <div class="col-12 col-md-6">
            <label>요단백</label>
            <select name="urine_protein" class="form-control">
              <option value="0" {{ 'selected' if data.urine_protein == 0 else '' }}>음성</option>
              <option value="1" {{ 'selected' if data.urine_protein == 1 else '' }}>의심</option>
              <option value="2" {{ 'selected' if data.urine_protein == 2 else '' }}>양성</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label>X-ray</label>
            <select name="xray" class="form-control">
              <option value="0" {{ 'selected' if data.xray == 0 else '' }}>음성</option>
              <option value="1" {{ 'selected' if data.xray == 1 else '' }}>양성</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label>구강검진</label>
            <select name="dental_exam" class="form-control">
              <option value="0" {{ 'selected' if data.dental_exam == 0 else '' }}>정상</option>
              <option value="1" {{ 'selected' if data.dental_exam == 1 else '' }}>이상</option>
            </select>
          </div>

        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-user btn-block">
        수정하기
      </button>

    </form>
  </div>
</div>

{% endblock %}
