{% extends "base.html" %}
{% block title %}
<title>{{page_title}}</title>
<link href="{{ url_for('static', filename='css/trend.css') }}" rel="stylesheet">
<style>
    /* 버튼 클릭 시 색상 유지를 위한 스타일 */
    .btn-trend { transition: all 0.2s; margin-bottom: 5px; font-weight: 600; border-width: 2px; }
    
    /* 활성화된 버튼들: 해당 카테고리 색상으로 꽉 채움 */
    .btn-outline-primary.active { background-color: #4e73df !important; color: #fff !important; }
    .btn-outline-info.active { background-color: #36b9cc !important; color: #fff !important; }
    .btn-outline-danger.active { background-color: #e74a3b !important; color: #fff !important; }
    .btn-outline-warning.active { background-color: #f6c23e !important; color: #fff !important; }
    .btn-outline-secondary.active { background-color: #858796 !important; color: #fff !important; }
    .btn-outline-success.active { background-color: #1cc88a !important; color: #fff !important; }

    /* 기준치 라벨 디자인 보강 */
    #stdLabel { font-size: 0.95rem; font-weight: 800; padding: 10px 15px; border-radius: 30px; }
    .badge-normal { background-color: #1cc88a; color: white; } /* 정상일 때 초록색 */
    .badge-caution { background-color: #e74a3b; color: white; } /* 주의 필요할 때 빨간색 */
</style>
{% endblock %}

{% block contents %}
<div class="col-12">
    <div class="trend-page">
        <div class="trend-header">
            <h1>종합 건강 지표 추이</h1>
            <p>항목을 선택하면 정상 기준 대비 나의 수치 변화를 확인합니다.</p>
        </div>

        {% if trend_data|length == 0 %}
            <div class="table-empty">
                <p>등록된 건강검진 결과가 없습니다.</p>
                <a href="{{ url_for('health.create_health_record') }}">등록하러 가기 →</a>
            </div>
        {% else %}
    
        <div class="card shadow mb-4">
            <div class="card-body">
                <div class="d-flex flex-wrap" style="gap: 8px;">
                    <button class="btn btn-outline-primary btn-sm btn-trend" onclick="changeChart(this, 'height', '키', null, true)">1. 키</button>
                    <button class="btn btn-outline-primary btn-sm btn-trend" onclick="changeChart(this, 'weight', '몸무게', null, true)">2. 몸무게</button>
                    <button class="btn btn-outline-primary btn-sm btn-trend" onclick="changeChart(this, 'BMI', 'BMI', 23, true)">3. BMI</button>
                    <button class="btn btn-outline-primary btn-sm btn-trend" onclick="changeChart(this, 'waist', '허리둘레', 90, true)">4. 허리둘레</button>
                    
                    <button class="btn btn-outline-info btn-sm btn-trend" onclick="changeChart(this, 'vision_left', '시력(좌)', null, false)">5. 시력(좌)</button>
                    <button class="btn btn-outline-info btn-sm btn-trend" onclick="changeChart(this, 'vision_right', '시력(우)', null, false)">6. 시력(우)</button>
                    
                    <button class="btn btn-outline-danger btn-sm btn-trend" onclick="changeChart(this, 'systolic_bp', '수축기 혈압', 120, true)">7. 수축기</button>
                    <button class="btn btn-outline-danger btn-sm btn-trend" onclick="changeChart(this, 'diastolic_bp', '이완기 혈압', 80, true)">8. 이완기</button>
                    
                    <button class="btn btn-outline-warning btn-sm btn-trend" onclick="changeChart(this, 'hemoglobin', '혈색소', 13, false)">9. 혈색소</button>
                    <button class="btn btn-outline-warning btn-sm btn-trend" onclick="changeChart(this, 'fasting_glucose', '공복혈당', 100, true)">10. 공복혈당</button>
                    
                    <button class="btn btn-outline-secondary btn-sm btn-trend" onclick="changeChart(this, 'creatinine', '크레아티닌', 1.2, true)">11. 크레아티닌</button>
                    <button class="btn btn-outline-secondary btn-sm btn-trend" onclick="changeChart(this, 'eGFR', 'GFR(신사구체 여과율)', 60, false)">12. GFR</button>
                    
                    <button class="btn btn-outline-success btn-sm btn-trend" onclick="changeChart(this, 'AST', 'AST(간기능)', 40, true)">13. AST</button>
                    <button class="btn btn-outline-success btn-sm btn-trend" onclick="changeChart(this, 'ALT', 'ALT(간기능)', 40, true)">14. ALT</button>
                    <button class="btn btn-outline-success btn-sm btn-trend" onclick="changeChart(this, 'rGTP', 'r-GTP(감마지티피)', 50, true)">15. rGTP</button>
                </div>
            </div>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary" id="chartLabel">데이터 로딩 중...</h6>
                <div id="stdLabelArea">
                    <span id="stdLabel" style="display:none;"></span>
                </div>
            </div>
            <div class="card-body">
                <div style="height: 420px;"><canvas id="trendChart"></canvas></div>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script>
    const rawData = {{ trend_data | tojson | safe }};
    let myChart = null;

    function changeChart(btnElement, col, label, std, isUnder) {
        if (!rawData || rawData.length === 0) return;

        // 1. 버튼 활성화 상태 유지
        const buttons = document.querySelectorAll('.btn-trend');
        buttons.forEach(btn => btn.classList.remove('active'));
        if (btnElement) btnElement.classList.add('active');

        // 2. 라벨 및 기준치 텍스트 설정 (이상/이하 표시)
        document.getElementById('chartLabel').innerText = label + " 변화 추이";
        const stdLabel = document.getElementById('stdLabel');
        
        if (std !== null) {
            const direction = isUnder ? " 이하" : " 이상";
            stdLabel.innerText = "정상 기준: " + std + direction;
            stdLabel.style.display = "inline";

            // 최근 데이터와 비교하여 색상 변경
            const latestVal = parseFloat(rawData[rawData.length - 1][col]);
            const isNormal = isUnder ? (latestVal <= std) : (latestVal >= std);
            
            stdLabel.className = isNormal ? "badge badge-normal" : "badge badge-caution";
        } else {
            stdLabel.style.display = "none";
        }

        // 3. 차트 그리기
        const ctx = document.getElementById('trendChart');
        if (myChart) myChart.destroy();

        const labels = rawData.map(d => d.formatted_date || "검진일");

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '나의 수치',
                        data: rawData.map(d => d[col]),
                        borderColor: '#4e73df',
                        backgroundColor: 'rgba(78, 115, 223, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 6,
                        pointHitRadius: 10,
                        pointBackgroundColor: '#4e73df'
                    },
                    ...(std !== null ? [{
                        label: '정상 기준선 (' + std + (isUnder ? ' 이하' : ' 이상') + ')',
                        data: rawData.map(() => std),
                        borderColor: '#e74a3b',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        borderWidth: 2
                    }] : [])
                ]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: { 
                    y: { 
                        beginAtZero: false,
                        grid: { color: '#f0f0f0' },
                        ticks: { font: { weight: 'bold' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { font: { weight: 'bold' } }
                    }
                }
            }
        });
    }

    window.onload = function() {
        if (rawData && rawData.length > 0) {
            // BMI를 기본값으로 설정 (3번째 버튼)
            const defaultBtn = document.querySelectorAll('.btn-trend')[2]; 
            changeChart(defaultBtn, 'BMI', 'BMI', 23, true);
        }
    };
</script>
{% endblock %}
